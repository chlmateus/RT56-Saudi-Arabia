l_english:
 SAU_oil_embargo_threat: "Oil Embargo Threat"
 SAU_oil_embargo_threat_desc: "Saudi Arabia has begun weaponizing its vast oil reserves, threatening to cut off supply to nations that oppose its interests. This poses a significant economic threat to oil-dependent nations and has made many wary of Saudi Arabia's diplomatic intentions."
 SAU_fear_of_oil_cutoff: "Fear of Oil Cutoff"
 SAU_fear_of_oil_cutoff_desc: "Saudi Arabia has threatened to cut off our oil supply if we do not comply with their demands. This threat has damaged our relationship."
