 # Oil Trade Decisions
 SAU_trade_oil_for_civs: "Barter Oil Reserves for Civilian Infrastructure"
 SAU_trade_oil_for_civs_desc: "Sign sweeping international trade concessions. We will export large quantities of raw oil in exchange for turnkey civilian factories. Note: This will temporarily disrupt local extraction operations."
 SAU_trade_oil_for_mils: "Trade Oil Rights for Military Factories"
 SAU_trade_oil_for_mils_desc: "Leverage our resource extraction rights to foreign weapon syndicates in exchange for immediate local arms factory configurations. Note: This will temporarily halt regular production."
 SAU_trade_oil_for_research: "Fund Modern Academies via Oil Concessions"
 SAU_trade_oil_for_research_desc: "Pledge our resource profits directly to international technical universities to permanently expand our state research capabilities, causing a brief disruption to extraction."
 SAU_trade_oil_for_stability: "Subsidize Domestic Commodities with Oil Dividends"
 SAU_trade_oil_for_stability_desc: "Divert a small measure of our oil production capacity to fund domestic subsidies, calming the public and restoring deep faith in national stability."

