 # 6. TOOLTIP TARGET IDEAS
 # =================================================================
 aioc_sau: "AIOC Presence"
 aioc_sau_desc: "The Anglo-Iranian Oil Company operates extensive infrastructure here, extracting resource value while creating foreign economic entanglements."
 
 brabag_sau: "BRABAG Assistance"
 brabag_sau_desc: "German synthetic fuel engineers and chemical experts are actively auditing and improving our fuel processing plants."
 
 standard_oil_california_sau: "SoCal Operations"
 standard_oil_california_sau_desc: "Standard Oil of California has brought state-of-the-art American drilling rigs to our oil fields, maximizing raw extraction rates."
 sau_corporate_partnership: "Corporate Oil Partnership"
 sau_corporate_partnership_desc: "By leasing our vast oil fields to Western conglomerates, we have traded total resource sovereignty for rapid industrialization, cutting-edge drilling gear, and massive financial kickbacks."
 SAU_transport_network_spirit: "Expanded Transport Network"
 SAU_transport_network_spirit_desc: "Our investments in domestic infrastructure have streamlined supply lines across the desert."
 SAU_oil_deals_category: "Foreign Oil Leases"
 SAU_oil_deals_category_desc: "By signing temporary extraction concessions with foreign corporations, we can bypass our domestic industrial limitations and secure vital heavy machinery."
 SAU_oil_for_civs: "Lease Oil Fields for Civilian Machinery"
 SAU_oil_for_civs_desc: "We will grant foreign companies increased drilling rights in exchange for the immediate import of industrial manufacturing equipment."
 SAU_oil_for_mils: "Barter Oil for Military Infrastructure"
 SAU_oil_for_mils_desc: "Foreign powers are hungry for our crude. In exchange for steady supply lines, their engineers will construct and supply localized military workshops."
