 SAU_oil_decisions_cate: "Saudi Oil Development"
 SAU_expand_ghawar: "Expand Ghawar Field"
 SAU_expand_ghawar_desc: "Increase extraction infrastructure at the Ghawar oil field."
 SAU_develop_safaniya: "Develop Safaniya Offshore"
 SAU_develop_safaniya_desc: "Invest in offshore extraction technology."
 SAU_build_refinery: "Build Refinery Complex"
 SAU_build_refinery_desc: "Construct a new refinery to process raw crude."
 SAU_national_pipeline: "National Pipeline Network"
 SAU_national_pipeline_desc: "Expand our national pipeline capacity."
 SAU_royal_decree_unity: "Royal Decree of Unity"
 SAU_royal_decree_unity_desc: "Issue a decree to improve national stability."
 SAU_consolidate_tribes: "Consolidate Tribal Loyalties"
 SAU_consolidate_tribes_desc: "Strengthen ties with influential tribal leaders."
 SAU_expand_bureaucracy: "Expand Bureaucracy"
 SAU_expand_bureaucracy_desc: "Streamline government processes to gain political influence."
 SAU_diplomatic_oil_leverage: "Diplomatic Oil Leverage"
