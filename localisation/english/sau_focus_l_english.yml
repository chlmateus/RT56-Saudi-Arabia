l_english:
 SAU_oil_prospecting: "Oil Prospecting"
 SAU_oil_prospecting_desc: "The vast sands of Arabia hide immense wealth beneath their shifting dunes. It is time we deploy dedicated geological teams to uncover our subterranean bounty."
 SAU_aramco_pipeline: "The Aramco Pipeline"
 SAU_aramco_pipeline_desc: "To effectively transport and exploit our newly discovered petroleum, we must construct a modern network of pipelines stretching across our territories to our ports."
 SAU_state_mining_corp: "State Mining Corporation"
 SAU_state_mining_corp_desc: "Expanding beyond just oil, the state will establish a centralized mining entity to tap into mineral reserves and feed our growing industrial complexes."
 SAU_hejaz_railway_revival: "Revival of the Hejaz Railway"
 SAU_hejaz_railway_revival_desc: "The old Ottoman artery that once connected the holy sanctuaries can breathe new life. Rebuilding this railway will accelerate troop movements and resource transit across the Peninsula."
 SAU_refinery_boom_path: "Refinery Boom"
 SAU_refinery_boom_path_desc: "Raw crude is valuable, but refined fuel is power. We must invest heavily in building state-of-the-art synthetic and chemical refineries."
 SAU_petrochemicals: "Petrochemical Industry"
 SAU_petrochemicals_desc: "By establishing a robust petrochemical sector, we can process oil byproducts into advanced materials, synthetic rubbers, and vital industrial components."
 SAU_foreign_concessions: "Foreign Concessions"
 SAU_foreign_concessions_desc: "We currently lack the native expertise to extract our oil efficiently. Inviting foreign corporate giants will yield immediate capital and equipment, even if it compromises a bit of our sovereignty."
 SAU_offshore_drilling: "Offshore Drilling Operations"
 SAU_offshore_drilling_desc: "The bounty of the seas awaits. By expanding our petroleum operations into the coastal shelves of the Gulf, our national reserves will multiply significantly."
 SAU_nationalize_oil: "Nationalize the Oil Industry"
 SAU_nationalize_oil_desc: "The wealth of our land belongs to our people, not foreign capitalists. We shall seize control of all oil infrastructure, regardless of international outcries."
 SAU_heavy_foundries: "Heavy Foundries"
 SAU_heavy_foundries_desc: "With our resource streams secured under state control, we can feed the fires of new, massive foundries to manufacture heavy machinery and military hardware."
 SAU_western_giants: "Embrace Western Giants"
 SAU_western_giants_desc: "Let us double down on our partnerships with western corporate empires. Their immense capital investments and technological marvels will supercharge our growth."
 SAU_imported_mech: "Imported Mechanization"
 SAU_imported_mech_desc: "Utilizing the immense profits from foreign trade partnerships, we shall import advanced industrial machinery to modernize our economy almost overnight."
 SAU_desert_power_grid: "Desert Power Grid"
 SAU_desert_power_grid_desc: "To unify our expanding industrial bases, we must construct a massive, interconnected electrical grid stretching across the deserts to light up our factories."
 SAU_automotive_hub: "Automotive Manufacturing Hub"
 SAU_automotive_hub_desc: "With steady electricity and metallurgy secured, we can transition to producing motorized vehicles natively, providing vital logistical muscle for our armies."
 SAU_red_sea_arsenal: "Red Sea Arsenal"
 SAU_red_sea_arsenal_desc: "The Red Sea must become a secure waterway under our domain. Establishing a major naval and arms production center on the coast will project our strength outward."
 SAU_abbasid_revolution: "The Neo-Abbasid Revolution"
 SAU_abbasid_revolution_desc: "The old order falls, and a glorious past returns. We proclaim a grand revolution to restore the rightful prestige, unity, and power of the historic Caliphate."
 SAU_campaign_for_mesopotamia: "Campaign for Mesopotamia"
 SAU_campaign_for_mesopotamia_desc: "The fertile lands between the Tigris and Euphrates were once the heart of our civilization. We must launch a sweeping campaign to reclaim them from foreign hands."
 SAU_found_baghdad: "Found New Baghdad"
 SAU_found_baghdad_desc: "Baghdad shall rise once more as the radiant capital of our empire—a monument to our renewed political, economic, and cultural ascendancy."
 SAU_demand_holy_submission: "Demand Holy Submission"
 SAU_demand_holy_submission_desc: "Our neighbors must recognize the ultimate authority of the true Caliphate. We demand their total compliance and peaceful integration into our righteous state."
 SAU_sword_of_the_palestine: "Sword of Palestine"
 SAU_sword_of_the_palestine_desc: "We turn our eyes toward Jerusalem and the Holy Land. No foreign power shall deny us our sacred obligation to protect and rule these lands."
 SAU_integrate_the_levant: "Integrate the Levant"
 SAU_integrate_the_levant_desc: "From the Mediterranean coast to the Jordan river, the newly liberated states of the Levant must be fully integrated administratively into our grand empire."
 SAU_claim_the_nile: "Claim the Nile"
 SAU_claim_the_nile_desc: "Egypt's dominance over the Nile must yield to our grand pan-Islamic vision. We shall advance our armies to secure the breadbasket of the ancient world."
 SAU_march_on_the_maghreb: "March on the Maghreb"
 SAU_march_on_the_maghreb_desc: "The call to unity echoes across North Africa. Our armies shall sweep westward to bring the Maghreb states under the protection of the Caliphate's banner."
 SAU_subjugate_the_iranian_plateau: "Subjugate the Iranian Plateau"
 SAU_subjugate_the_iranian_plateau_desc: "To the east lies Persia, a land of ancient rivalries and deep strategic depth. We must strike hard and bring the plateau under our absolute control."
 SAU_legacy_of_khorasan: "Legacy of Khorasan"
 SAU_legacy_of_khorasan_desc: "Evoking the ancient warrior spirits of Khorasan, our military theorists will master the arts of land warfare to cement our eastern conquests."
 SAU_restoration_of_the_golden_age: "Restoration of the Golden Age"
 SAU_restoration_of_the_golden_age_desc: "The fragmented worlds of Islam are finally reunited. The Neo-Abbasid Caliphate stands supreme, initiating a glorious new Golden Age of science, power, and global dominance."
  SAU_caliphate_oil_monopoly: "Caliphate Oil Monopoly"
  SAU_caliphate_oil_monopoly_desc: "By controlling the primary oil fields of the Middle East and North Africa, the Caliphate now holds an absolute monopoly over the lifeblood of global industry."
  SAU_unlock_oil_decisions: "Unlock Oil Trading Decisions"
  SAU_unlock_oil_decisions_desc: "With our oil monopoly secured and established, we now possess the authority and leverage to engage in sweeping international oil trade agreements. Foreign powers shall compete desperately for access to our black gold, allowing us to negotiate tremendous concessions in exchange for guaranteed supply."
  SAU_revive_the_gold_dinar: "Revive the Gold Dinar"
  SAU_revive_the_gold_dinar_desc: "We discard volatile, foreign fiat currencies and establish the Gold Dinar as our sovereign monetary standard, completely dominating international trade markets."
 SAU_weaponize_the_black_gold: "Weaponize the Black Gold"
 SAU_weaponize_the_black_gold_desc: "Let the global majors tremble. Our oil is a weapon; those who oppose our geopolitical ambitions will find themselves completely cut off from energy supplies."
 SAU_the_eastern_push: "The Eastern Push"
 SAU_the_eastern_push_desc: "Our borders must expand toward Central Asia. We shall launch initiatives to exert absolute political and military pressure along our eastern horizons."
 SAU_battle_of_talas: "Memory of Talas"
 SAU_battle_of_talas_desc: "Drawing inspiration from our historic clash at Talas, our generals will devise new, innovative doctrines to combat massive foreign empires effectively."
 SAU_monetize: "Monetize Conquests"
 SAU_monetize_desc: "The wealth and capital accumulated from our eastern pushes must be actively funneled directly back into local manufacturing and rapid domestic development."
 SAU_paper_mill: "Establish Paper Mills"
 SAU_paper_mill_desc: "Reviving ancient secrets of mass knowledge distribution, we will construct modern paper processing mills to fuel a dramatic expansion of scientific research."
 SAU_house_of_wisdom: "The House of Wisdom"
 SAU_house_of_wisdom_desc: "We rebuild the legendary Bayt al-Hikma in Baghdad. Scholars, researchers, and engineers from across the world will gather to unlock new technological breakthroughs."
 SAU_the_byzantine_frontier: "The Byzantine Frontier"
 SAU_the_byzantine_frontier_desc: "Our northern borders face old, persistent adversaries. We must stabilize and fortify our geopolitical stance against the powers of Anatolia."
 SAU_fortify_the_thughur: "Fortify the Thughur"
 SAU_fortify_the_thughur_desc: "Recreating the historic line of marches and frontier fortresses, we will build an impenetrable network of forts along our northern boundaries."
 SAU_the_sack_of_amorium: "The Sack of Amorium"
 SAU_the_sack_of_amorium_desc: "A show of ultimate force to shatter our enemies' resolve. We will embrace an uncompromising military doctrine that prioritizes overwhelming offensive shock power."
 SAU_mediterranean_navies: "Mediterranean Navies"
 SAU_mediterranean_navies_desc: "To project true power beyond the Levant, we require a blue-water navy. New dockyards will begin churning out a proud Mediterranean fleet."
 SAU_sicilian_expedition: "The Sicilian Expedition"
 SAU_sicilian_expedition_desc: "Just as our ancestors did, we look across the sea to Italy. We shall prepare an ambitious naval expedition to establish a vital foothold in southern Europe."
 SAU_fertile_crescent_irrigation: "Fertile Crescent Irrigation"
 SAU_fertile_crescent_irrigation_desc: "By utilizing modern engineering to upgrade the ancient canals of the Nile, Tigris, and Euphrates, we will ensure our empire's total agrarian self-sufficiency."
 SAU_silk_road_tariffs: "Silk Road Tariffs"
 SAU_silk_road_tariffs_desc: "Dominating the crossroads of global trade allows us to levy heavy tariffs on goods passing between East and West, funding our industrial expansion."
 SAU_industrial_foundation: "Industrial Foundation"
 SAU_industrial_foundation_desc: "Before we can forge an empire, we must build a baseline economy. We will establish the foundation of our domestic industrial infrastructure."
 SAU_resource_prospecting: "Resource Prospecting"
 SAU_resource_prospecting_desc: "Our territories are rich in hidden ores and materials. Systematic prospecting will unlock the raw minerals required for a self-sustaining economy."
 SAU_refinery_investment: "Refinery Investment"
 SAU_refinery_investment_desc: "Expanding our processing capacity ensures that we can refine our raw resources efficiently, cutting down our reliance on foreign processing."
 SAU_industrial_efficiency: "Industrial Efficiency"
 SAU_industrial_efficiency_desc: "By streamlining factory management and maximizing production lines, we will ensure that every scrap of material is utilized perfectly."
 SAU_civil_survey: "Civil Survey"
 SAU_civil_survey_desc: "A complete logistical and demographic survey of our provinces will allow the state to allocate building space and infrastructure efficiently."
 SAU_local_workshops: "Expand Local Workshops"
 SAU_local_workshops_desc: "Empowering municipal and regional craftsmen ensures a steady baseline of civilian goods and production capabilities across our core states."
 SAU_transport_network: "Expand Transport Network"
 SAU_transport_network_desc: "Paving roads and establishing logistical links between major hubs will allow resources to flow freely, accelerating civilian projects."
 SAU_urban_centers: "Modernize Urban Centers"
 SAU_urban_centers_desc: "Concentrating industrial efforts into our major cities will create massive, efficient hubs of urban manufacturing and commerce."
 SAU_agricultural_machinery: "Agricultural Mechanization"
 SAU_agricultural_machinery_desc: "By modernizing farming tools, we can maximize agricultural yields while freeing up rural labor to work in our expanding factories."
 SAU_national_infrastructure: "National Infrastructure Project"
 SAU_national_infrastructure_desc: "A sweeping state initiative to lay down premium infrastructure networks, fully connecting our primary manufacturing sectors."
 SAU_foundries_initiation: "Initiate Foundries"
 SAU_foundries_initiation_desc: "Heavy industry requires heavy metals. We will set up our first major foundries to supply raw steel for our military ambitions."
 SAU_arms_manufacturing: "Arms Manufacturing"
 SAU_arms_manufacturing_desc: "We cannot rely on foreign imports to defend our sovereignty. The construction of state-run arms factories will secure our rifle supplies."
 SAU_ordnance_workshops: "Ordnance Workshops"
 SAU_ordnance_workshops_desc: "Expanding our military production to include specialized ordnance and artillery workshops will allow us to field heavier firepower."
 SAU_mechanized_tools: "Mechanized Machine Tools"
 SAU_mechanized_tools_desc: "Investing in advanced manufacturing tools will allow our defense plants to operate at maximum output and efficiency."
 SAU_heavy_armaments: "Heavy Armaments Production"
 SAU_heavy_armaments_desc: "From field artillery to motorized assets, our military industrial complex will expand to produce heavy tactical equipment."
 SAU_strategic_arsenals: "Strategic Arsenals"
 SAU_strategic_arsenals_desc: "Establishing secure, centralized arsenals ensures that our armies will always be backed by massive, uninterrupted stockpiles of military hardware."
 SAU_military_industrial_spirit: "Military-Industrial Backbone"
 SAU_military_industrial_spirit_desc: "Our localized workshops and standardized designs ensure an uninterrupted stream of hardware to frontline troops."
 sau_state_mining_modifier: "State Mining Monopoly"
 sau_state_mining_modifier_desc: "Centralized controls ensure that extracted mineral wealth goes directly toward public heavy complexes."
 sau_railway_speed_modifier: "Hejaz Transit Integration"
 sau_railway_speed_modifier_desc: "The rebirth of our rail veins facilitates swift nationwide logistics and heavy materials hauling."
 sau_fuel_capacity_modifier: "Expanded Strategic Reservoirs"
 sau_fuel_capacity_modifier_desc: "Massive containment structures store vital fuel variants to withstand long-term global isolation."
 sau_petrochem_efficiency: "Petrochemical Domination"
 sau_petrochem_efficiency_desc: "Advanced conversion processes squeezing maximal auxiliary products out of our raw petroleum output."
 sau_nationalization_output: "Nationalized Black Gold"
 sau_nationalization_output_desc: "Sovereignty restored. Every drop extracted directly fills our treasury instead of lined foreign pockets."
 sau_heavy_foundry_modifier: "Sovereign Heavy Metallurgy"
 sau_heavy_foundry_modifier_desc: "Massive scale foundry lines output high-grade steel for heavy arms processing structures."
 sau_corporate_partnership: "Western Corporate Alliances"
 sau_corporate_partnership_desc: "Deep economic alignment with western enterprise groups yields staggering infrastructural modernization speeds."
 sau_machinery_import_speed: "Accelerated Mechanization Influx"
 sau_machinery_import_speed_desc: "Foreign assembly lines supply our growing urban bases with cutting-edge tools and industrial components."
 sau_electrification_modifier: "Integrated Desert Power Grid"
 sau_electrification_modifier_desc: "Electrical infrastructure ties together distant manufacturing centers, streamlining total factory outputs."
 sau_motorized_efficiency: "Automotive Hub Sovereignty"
 sau_motorized_efficiency_desc: "Natively manufactured chassis speed up the transformation of our armed forces into mechanized divisions."
 sau_coastal_arsenal_output: "Red Sea Shipwrights"
 sau_coastal_arsenal_output_desc: "Strategic coastal manufacturing networks feed our regional naval dockyard lines efficiently."
 SAU_mesopotamian_campaign_buff: "Mesopotamian Reclamation Drive"
 SAU_mesopotamian_campaign_buff_desc: "A powerful ideological surge propels our divisions to secure our ancestral river valleys."
 SAU_sword_of_the_caliphate_buff: "Sword of the Caliphate"
 SAU_sword_of_the_caliphate_buff_desc: "Divine inspiration drives our forces onward to defend our most sacred holy sanctuaries."
 SAU_khorasan_guards_idea: "Legacy of Khorasan"
 SAU_khorasan_guards_idea_desc: "Imbued with ancestral battlefield doctrines, our soldiers exhibit elite cohesion and combat endurance."
 SAU_house_of_wisdom_revived: "Neo-Abbasid Golden Age"
 SAU_house_of_wisdom_revived_desc: "A cultural, industrial, and global resurgence positions our state as an undisputed superpower."
 SAU_abbasid_oil_monopoly_spirit: "Global Fuel Imperium"
 SAU_abbasid_oil_monopoly_spirit_desc: "We dictate global energy terms. Our vast reserves guarantee unchecked domestic production limits."
 SAU_oil_embargo_threat: "Weaponized Energy Embargos"
 SAU_oil_embargo_threat_desc: "Foreign powers tread carefully; the mere threat of a total oil cutoff silences international critics."
 SAU_grand_library_of_baghdad: "The Grand Library"
 SAU_grand_library_of_baghdad_desc: "Centuries of compiled scientific resources accelerate our ongoing global research milestones."
 SAU_spirit_of_amorium: "Spirit of Amorium"
 SAU_spirit_of_amorium_desc: "Uncompromising tactical aggressiveness drives our military planners to shatter opposing frontlines."
 SAU_monetize_spirit: "Monetized Eastern Conquests"
 SAU_monetize_spirit_desc: "Capital reserves seized during our territorial pushes are poured back directly into our public engineering plans."
 SAU_paper_mill_spirit: "Domestic Paper Milling Infrastructure"
 SAU_paper_mill_spirit_desc: "The construction of massive national paper networks modernizes administrative and technical research speeds."
 SAU_silk_road_tariffs_spirit: "Silk Road Customs Dominion"
 SAU_silk_road_tariffs_spirit_desc: "By collecting heavy taxes on intercontinental traffic, we enjoy complete financial and industrial security."
 SAU_resource_prospecting_spirit: "Geological Extraction Mandate"
 SAU_resource_prospecting_spirit_desc: "Systematic scanning of raw mining deposits secures an optimal yield of metals and materials."
 SAU_industrial_efficiency_spirit: "Streamlined Assembly Standards"
 SAU_industrial_efficiency_spirit_desc: "Maximized production configurations significantly eliminate waste while generating industrial efficiency gains."
 SAU_transport_network_spirit: "Integrated Transport Logistics"
 SAU_transport_network_spirit_desc: "Upgraded regional routes speed up macro infrastructure laying processes nationwide."
 SAU_ordnance_workshops_spirit: "Dedicated Heavy Ordnance Lines"
 SAU_ordnance_workshops_spirit_desc: "Specialized military engineering teams optimize factory limits for combat munitions manufacturing."
 SAU_mechanized_tools_spirit: "Precision Machine Tooling"
 SAU_mechanized_tools_spirit_desc: "Advanced industrial machinery increases the production efficiency ceilings within our manufacturing sectors."
 # =================================================================
 # 1. POLITICAL & TRIBAL PATH IDEAS
 # =================================================================
 SAU_support_from_loyal_tribes: "Tribal Support"
 SAU_support_from_loyal_tribes_desc: "The major Bedouin tribes have sworn allegiance to the House of Saud, offering steady flows of manpower and internal stability."
 
 SAU_diplomacy_in_the_sand_idea: "Diplomacy in the Sand"
 SAU_diplomacy_in_the_sand_idea_desc: "Navigating the complex web of tribal rivalries and regional politics requires a delicate, uniquely Arabian touch."
 
 SAU_hakimovs_influence: "The Red Pasha's Legacy"
 SAU_hakimovs_influence_desc: "The diplomatic groundwork laid by Karim Hakimov has fostered an uncharacteristically close understanding with the Soviet Union."
 
 PER_restore_constitutionalism: "Restored Constitutionalism"
 PER_restore_constitutionalism_desc: "Establishing a clear legal framework balances the absolute power of the monarch, assuring the public of stable governance."
 
 SAU_mandatory_zakat: "Enforced Zakat"
 SAU_mandatory_zakat_desc: "Enforcing the traditional Islamic tax ensures that wealth is redistributed to fund infrastructure, keeping consumer strain low."
 
 SAU_force_tribes_to_settle: "Sedentarization of the Bedouin"
 SAU_force_tribes_to_settle_desc: "Forcing nomadic populations into permanent settlements fractures tribal autonomy, boosting central authority and resource extraction at the cost of short-term stability."
 
 SAU_benefits_from_the_hajj: "Hajj Revenue & Prestige"
 SAU_benefits_from_the_hajj_desc: "Efficient management of the holy pilgrimages fills the state treasury and commands immense respect across the Islamic world."
 
 SAU_abdulaziz_idea: "Legacy of Ibn Saud"
 SAU_abdulaziz_idea_desc: "The iron will, charisma, and unifying vision of King Abdulaziz serve as the foundational pillar of the entire state."

 # =================================================================
 # 2. DIPLOMACY & FOREIGN ALIGNMENT IDEAS
 # =================================================================
 neutrality_idea: "Strict Neutrality"
 neutrality_idea_desc: "By intentionally avoiding the chaotic disputes of foreign empires, we safeguard our sovereign territory from global destruction."
 
 AFG_censorship: "State Censorship"
 AFG_censorship_desc: "Tight control over the press and foreign media outlets ensures that subversive elements cannot take root within our borders."
 
 SAU_increase_oil_exports_to_the_allies: "Allied Oil Concessions"
 SAU_increase_oil_exports_to_the_allies_desc: "Prioritizing the flow of black gold to the Allied powers secures immense economic goodwill and trade leverage."
 
 SAU_volunteer_corps: "Arab Volunteer Corps"
 SAU_volunteer_corps_desc: "Allowing ideologically driven young men to fight abroad spreads our influence without officially declaring war."

 # =================================================================
 # 3. MILITARY TREE IDEAS (LEGACY CHAINS & BUFFS)
 # =================================================================
 SAU_desert_buff1: "Masters of the Desert"
 SAU_desert_buff1_desc: "Our soldiers are born and bred among the harsh dunes. We turn the unforgiving environment into a deadly weapon against outsiders."
 
 SAU_legacy_of_1934: "Legacy of 1934"
 SAU_legacy_of_1934_desc: "The tactical blunders and organizational friction of the Saudi–Yemeni War still weigh heavily on our command structure. Our military is rigid and slow to adapt."
 
 SAU_legacy_of_1934_2: "Reformed Legacy of 1934"
 SAU_legacy_of_1934_2_desc: "The worst tactical errors of the past conflict are being addressed, though the overall doctrine remains old-fashioned."
 
 SAU_legacy_of_1934_3: "Exorcising the Ghosts of 1934"
 SAU_legacy_of_1934_3_desc: "Modern standardizations have pushed the old deficiencies to the fringes of our army. We are ready for contemporary warfare."
 
 SAU_legacy_of_1934_4: "A New Martial Era"
 SAU_legacy_of_1934_4_desc: "The lessons of the past have been fully absorbed and integrated. Our military stands as a thoroughly modernized, lethal fighting force."
 
 inventive_leadership_spirit: "Inventive Leadership"
 inventive_leadership_spirit_desc: "Encouraging a culture of initiative and flexibility within the junior officer corps."
 
 SAU_creative_generals: "Tactical Unorthodoxy"
 SAU_creative_generals_desc: "Our field commanders are explicitly encouraged to throw out the textbook and find creative solutions to battlefield problems."
 
 SAU_incorporate_nomad_tactics1: "Nomadic Cavalry Doctrines"
 SAU_incorporate_nomad_tactics1_desc: "Blending traditional Bedouin hit-and-run desert raiding with modern, fast-moving mobile formations."
 
 SAU_romanticize_army1: "Martial Romanticism"
 SAU_romanticize_army1_desc: "National propaganda paints the soldier as a heroic, holy protector of the homeland, swelling national war support."
 
 SAU_general_army_buff1: "Unyielding Defiance"
 SAU_general_army_buff1_desc: "A deeply ingrained cultural resolve to fight with desperate fury when defending our home soil."
 
 political_commissars_focus: "Ideological Overseers"
 political_commissars_focus_desc: "Ensuring absolute political and moral conformity within the ranks, boosting morale while frustrating independent thinkers."
 
 AFG_five_year_plan_idea: "State Five-Year Plan"
 AFG_five_year_plan_idea_desc: "A centralized, aggressive push by the state to construct heavy industry and repair crucial infrastructure."
 
 SAU_awoken_generation: "The Awoken Generation"
 SAU_awoken_generation_desc: "A disciplined, highly motivated generation of youth stands ready to serve the nation at a moment's notice."

 # =================================================================
 # 4. FASCIST / ISOLATIONIST PATH IDEAS
 # =================================================================
 SAU_spread_islamic_teachings: "Zealous Expansion"
 SAU_spread_islamic_teachings_desc: "Projecting our socio-religious ideals aggressively beyond our borders to destabilize neighboring secular regimes."
 
 SAU_restore_old_traditions: "Restoration of Ancestral Ways"
 SAU_restore_old_traditions_desc: "Rejecting foreign decadence in favor of our ancestral traditions builds immense societal unity, though it slows scientific adoption."
 
 deterrence: "The Porcupine Strategy"
 deterrence_desc: "Our defensive preparations make any theoretical invasion of our lands look so bloody and costly that foreign powers think twice."

 # =================================================================
 # 5. GENERAL INDUSTRIAL SPINE IDEAS
 # =================================================================
 SAU_resource_prospecting_spirit: "Desert Surveying Teams"
 SAU_resource_prospecting_spirit_desc: "Systematically mapping the vast, empty sands to locate and exploit hidden mineral and petroleum deposits."
 
 SAU_industrial_efficiency_spirit: "Streamlined Manufacturing"
 SAU_industrial_efficiency_spirit_desc: "Cutting out redundant bureaucratic checks to ensure factories run at peak efficiency."
 
 SAU_transport_network_spirit: "Trans-Arabian Infrastructure"
 SAU_transport_network_spirit_desc: "Building a robust network of roads and supply lines to bind our geographically isolated regions together."
 
 SAU_ordnance_workshops_spirit: "National Ordnance Workshops"
 SAU_ordnance_workshops_spirit_desc: "Domestic foundries dedicated to keeping our troops supplied with standardized firearms and ammunition."
 
 SAU_mechanized_tools_spirit: "Advanced Precision Tooling"
 SAU_mechanized_tools_spirit_desc: "Importing modern machinery to raise our maximum factory output capacity."

