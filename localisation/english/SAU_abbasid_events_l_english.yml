l_english:
 SAU_abbasid.1.t: "Al-Mansur al-Abbasi Takes Power"
 SAU_abbasid.1.d: "Following the completion of the Abbasid Revolution, the visionary leader Al-Mansur al-Abbasi has assumed control of Saudi Arabia. Under his guidance, the nation embarks upon a new era of Islamic restoration and territorial consolidation, drawing inspiration from the glorious legacy of the medieval Abbasid Caliphate. The restoration of centralized authority marks a turning point in our national history."
 SAU_abbasid.1.a: "A new dawn for the Caliphate"
 
 SAU_abbasid.2.t: "The Abbasid Caliphate Restored"
 SAU_abbasid.2.d: "Saudi Arabia has undergone a radical transformation. The nation, led by Al-Mansur al-Abbasi, has officially proclaimed itself as the Neo-Abbasid Caliphate. Drawing from the historical legacy of the golden age of Islamic civilization, this new state seeks to unite the Islamic world under a single banner. The implications of this declaration are far-reaching and may reshape the geopolitical balance of the Middle East."
 SAU_abbasid.2.a: "Interesting developments..."
